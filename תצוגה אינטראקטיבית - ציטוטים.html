.feat-profile { font-size: 13px; color: #666; line-height: 1.6; }
.feat-close {

  cursor: pointer; font-family: inherit; color: #555; flex-shrink: 0;
}
.feat-close:hover { background: #f5f5f5; }
.feat-quotes { max-width: 860px; }
.fq {

.controls {

  gap: 12px; padding: 18px 20px 14px;
}
.btn-main {
  background: #2E75B6; color: white; border: none;
  padding: 11px 30px; border-radius: 8px;
  font-size: 15px; cursor: pointer; font-family: inherit;
}
.btn-main:hover { background: #1A5A94; }
.btn-sec {
  background: white; color: #555; border: 1px solid #ccc;
  padding: 9px 20px; border-radius: 8px;
  font-size: 14px; cursor: pointer; font-family: inherit;
}
.btn-sec:hover { background: #f5f5f5; }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 14px;
  padding: 0 20px 32px;
  max-width: 1400px;
  margin: 0 auto;
}

/* Cards */
.card {
  background: white;
  border-radius: 14px;
  padding: 20px 16px 16px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid transparent;
  text-align: center;
  user-select: none;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(0,0,0,0.1); }
.card.selected { border-color: #2E75B6; box-shadow: 0 8px 22px rgba(46,117,182,0.22); }
.card.highlight { animation: pulse 0.7s ease; }
@keyframes pulse {

  40% { transform: scale(1.06); box-shadow: 0 14px 32px rgba(0,0,0,0.18); }

let paused = false;
const qIdx = {};

function buildGrid() {
  const grid = document.getElementById('grid');
  founders.forEach((f, fi) => {
    qIdx[fi] = 0;
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + fi;
    card.onclick = () => showFeatured(fi);
    card.innerHTML = `
      <div class="avatar" style="background:${f.color}">${f.name[0]}</div>
      <div class="card-name">${f.name}</div>
      <div class="card-meta">${f.role}<br>גיל ${f.age} · ${f.family}</div>
      <div class="quote-area">
        <div class="qt-text" id="qt-${fi}">"${f.quotes[0].text}"</div>
      </div>
    `;
    grid.appendChild(card);

    setInterval(() => {
      if (paused) return;
      const el = document.getElementById('qt-' + fi);
      if (!el) return;
      el.classList.add('fade');
      setTimeout(() => {
        qIdx[fi] = (qIdx[fi] + 1) % f.quotes.length;
        el.textContent = '“' + f.quotes[qIdx[fi]].text + '”';
        el.classList.remove('fade');
      }, 450);
    }, 4500 + fi * 500);
  });
}

function showFeatured(fi) {
  const f = founders[fi];
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + fi).classList.add('selected');

  document.getElementById('fa').style.background = f.color;
  document.getElementById('fa').textContent = f.name[0];
  document.getElementById('fn').textContent = f.name;
  document.getElementById('fp').innerHTML =
    `<strong>${f.role}</strong> &nbsp;·&nbsp; גיל ${f.age} &nbsp;·&nbsp; ${f.family}<br>משך מיזם: ${f.duration} &nbsp;·&nbsp; מאז מכירה: ${f.since_sale}`;

  const fq = document.getElementById('fq');
  fq.innerHTML = '';
  f.quotes.forEach(q => {
    const d = document.createElement('div');
    d.className = 'fq';
    d.style.borderColor = f.color;
    d.innerHTML = `<div class="qt">&#8220;${q.text}&#8221;</div><div class="tp">${q.topic}</div>`;
    fq.appendChild(d);
  });

  const panel = document.getElementById('featured');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeFeatured() {
  document.getElementById('featured').style.display = 'none';
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
}

function showRandom() {
  const fi = Math.floor(Math.random() * founders.length);
  const card = document.getElementById('card-' + fi);
  card.classList.add('highlight');
  setTimeout(() => card.classList.remove('highlight'), 700);
  showFeatured(fi);
}

function togglePause() {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶ הפעל' : '⏸ השהה';
}

buildGrid();
